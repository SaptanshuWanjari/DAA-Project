<div class="grid gap-3 md:grid-cols-2">
  <label class="block">
    <span
      class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-600"
      >Keys (comma-separated)</span
    >
    <input
      id="obst-keys"
      type="text"
      value="10,20,30,40"
      class="w-full rounded-md border border-slate-300 px-3 py-2 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"
    />
  </label>
  <label class="block">
    <span
      class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-600"
      >Probabilities</span
    >
    <input
      id="obst-probs"
      type="text"
      value="0.1,0.3,0.4,0.2"
      class="w-full rounded-md border border-slate-300 px-3 py-2 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"
    />
  </label>
</div>
