<div class="grid gap-3 sm:grid-cols-[1fr_auto] sm:items-end">
  <label class="block">
    <span
      class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-600"
      >Number of Sensor Readings (n)</span
    >
    <input
      id="cx-n"
      type="number"
      min="2"
      max="60"
      value="10"
      class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-brand-500"
    />
  </label>
  <div class="text-xs text-slate-500">Higher n exaggerates O(n^2) growth.</div>
</div>
