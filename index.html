<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DAA Visualizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <header class="sticky top-0 z-10 border-b border-slate-200 bg-white/95 backdrop-blur">
    <div class="mx-auto flex w-full max-w-6xl items-center justify-between px-4 py-4">
      <div class="logo text-lg font-bold tracking-wide">DAA<span class="text-cyan-600">_</span>VISUALIZER</div>
      <nav class="flex items-center gap-2 text-sm font-medium" aria-label="Primary">
      <a
        class="active rounded-md bg-slate-900 px-3 py-2 text-white focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cyan-500 focus-visible:ring-offset-2"
        data-page-link="home"
        href="#/home"
        hx-get="partials/home.html"
        hx-target="#app"
        hx-push-url="#/home"
      >
        Home
      </a>
      <a
        class="rounded-md px-3 py-2 text-slate-700 transition hover:bg-slate-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cyan-500 focus-visible:ring-offset-2"
        data-page-link="algorithms"
        href="#/algorithms"
        hx-get="partials/home.html"
        hx-target="#app"
        hx-push-url="#/algorithms"
      >
        Algorithms
      </a>
      </nav>
    </div>
  </header>

  <main class="page mx-auto w-full max-w-6xl px-4 py-8">
    <div
      id="app"
      class="min-h-[60vh]"
      hx-get="partials/home.html"
      hx-trigger="load"
      hx-target="#app"
      hx-swap="innerHTML"
    ></div>
  </main>

  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
